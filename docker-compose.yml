version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: payway_db
    environment:
      POSTGRES_USER: payway
      POSTGRES_PASSWORD: payway_local_password
      POSTGRES_DB: payway_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: payway_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: